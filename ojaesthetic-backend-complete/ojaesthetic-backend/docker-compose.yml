# ── Ojaesthetic — docker-compose.yml ────────────────────────
# Full local stack: Node API + MongoDB
# Usage: docker compose up

version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: oja_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ojaAdmin
      MONGO_INITDB_ROOT_PASSWORD: ojaSecret2025
      MONGO_INITDB_DATABASE: ojaesthetic
    volumes:
      - mongo_data:/data/db
    networks:
      - oja_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    container_name: oja_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://ojaAdmin:ojaSecret2025@mongo:27017/ojaesthetic?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - oja_network
    command: npm run dev

volumes:
  mongo_data:
    driver: local

networks:
  oja_network:
    driver: bridge
